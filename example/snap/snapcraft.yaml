name: khqr_sdk_example
version: 1.0.0
summary: Generated by Icons Launcher
description: Generated by Icons Launcher package for Linux.

confinement: strict
base: core22
grade: stable

slots:
  dbus-khqr_sdk_example: # adjust accordingly to your app name
    interface: dbus
    bus: session
    name: org.bar.khqr_sdk_example # adjust accordingly to your app name

apps:
